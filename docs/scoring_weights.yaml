# ============================================================================
# Fintrest Signal Engine v3 — Scoring Weights Config
# Phases committed: A + B (10 factors, 17 algorithms)
# Options Flow factor (Phase C) is NOT included — add later if committed.
#
# Every `regimes.<name>` block MUST sum to 1.0.
# Loaded at engine startup; changes require service restart.
# ============================================================================

version: "3.0"
phases_committed: ["A", "B"]

# ----------------------------------------------------------------------------
# Factor weights per regime. The engine classifies regime each morning and
# selects the matching block. The `base` block is a safety fallback for days
# when regime classification fails (missing FRED pull, etc.).
# ----------------------------------------------------------------------------
regimes:

  base:
    momentum:              0.18
    volume:                0.10
    catalyst:              0.12
    fundamentals:          0.15
    sentiment:             0.08
    trend:                 0.10
    risk:                  0.10
    cross_sectional_rank:  0.07
    estimate_revisions:    0.06
    macro_context:         0.04

  trending_bull:
    momentum:              0.22
    volume:                0.12
    catalyst:              0.13
    fundamentals:          0.12
    sentiment:             0.09
    trend:                 0.12
    risk:                  0.06
    cross_sectional_rank:  0.07
    estimate_revisions:    0.05
    macro_context:         0.02

  trending_bear:
    momentum:              0.10
    volume:                0.08
    catalyst:              0.10
    fundamentals:          0.20
    sentiment:             0.08
    trend:                 0.06
    risk:                  0.16
    cross_sectional_rank:  0.08
    estimate_revisions:    0.08
    macro_context:         0.06

  chop_low_vol:
    momentum:              0.16
    volume:                0.10
    catalyst:              0.14
    fundamentals:          0.16
    sentiment:             0.08
    trend:                 0.08
    risk:                  0.12
    cross_sectional_rank:  0.08
    estimate_revisions:    0.05
    macro_context:         0.03

  chop_high_vol:
    momentum:              0.12
    volume:                0.08
    catalyst:              0.14
    fundamentals:          0.18
    sentiment:             0.07
    trend:                 0.06
    risk:                  0.15
    cross_sectional_rank:  0.08
    estimate_revisions:    0.07
    macro_context:         0.05


# ----------------------------------------------------------------------------
# Signal tier thresholds per regime. Buy_today raises in risk-off / high-vol.
# ----------------------------------------------------------------------------
thresholds:
  base:           { buy_today: 80, watch_min: 60 }
  trending_bull:  { buy_today: 78, watch_min: 58 }
  trending_bear:  { buy_today: 82, watch_min: 62 }
  chop_low_vol:   { buy_today: 80, watch_min: 60 }
  chop_high_vol:  { buy_today: 82, watch_min: 62 }


# ----------------------------------------------------------------------------
# Emission filters (applied after scoring, before publication).
# ----------------------------------------------------------------------------
filters:
  buy_today:
    min_risk_reward:           1.5
    min_cross_sectional_rank:  0.70      # must be top 30% of sector peers
    require_valid_trade_zone:  true
  watch:
    top_n_by_score:            20
    require_valid_trade_zone:  true


# ----------------------------------------------------------------------------
# Regime transition handling. First N trading days after a regime change,
# reduce emitted confidence — most signal failures happen at transitions.
# ----------------------------------------------------------------------------
regime_transition:
  confidence_penalty:  0.15              # multiply score * (1 - 0.15)
  cooldown_days:       3


# ----------------------------------------------------------------------------
# Algorithm registry — which of the 17 algorithms are active in v3 A+B.
# Flip `enabled: false` to silence an algorithm without a code deploy.
# IC tracking runs regardless of enabled state.
# ----------------------------------------------------------------------------
algorithms:

  # --- v2 carry-overs (10) ---
  jegadeesh_titman_momentum:       { enabled: true, factor: momentum }
  rsi_divergence:                  { enabled: true, factor: momentum }
  momentum_acceleration:           { enabled: true, factor: momentum }
  volume_price_confirmation:       { enabled: true, factor: volume }
  pead:                            { enabled: true, factor: catalyst }
  bollinger_squeeze:               { enabled: true, factor: trend }
  mean_reversion_zscore:           { enabled: true, factor: risk }
  market_regime_awareness:         { enabled: true, factor: risk }
  insider_cluster_buying:          { enabled: true, factor: sentiment }
  accumulation_distribution:       { enabled: true, factor: volume }

  # --- v3 Phase A additions (6) ---
  eps_revision_breadth:            { enabled: true, factor: estimate_revisions }
  sector_relative_strength:        { enabled: true, factor: cross_sectional_rank }
  garch_volatility_forecast:       { enabled: true, factor: risk }
  ticker_earnings_drift_pattern:   { enabled: true, factor: catalyst }
  short_interest_squeeze:          { enabled: true, factor: sentiment }
  anchored_vwap:                   { enabled: true, factor: trend }          # trade-zone helper; lower priority
  # multi_timeframe_rsi — DEPRIORITIZED, overlaps with rsi_divergence; revisit after 90d IC data

  # --- v3 Phase B addition (1) ---
  macro_regime_signal:             { enabled: true, factor: macro_context }
