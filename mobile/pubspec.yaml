name: fintrest
description: "Fintrest.ai — AI-powered swing trade discovery"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0

  # Networking
  dio: ^5.7.0

  # Local storage
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.0

  # UI
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  fl_chart: ^0.70.0
  lucide_icons: ^0.257.0
  supabase_flutter: ^2.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
