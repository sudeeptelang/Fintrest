# fly.toml app configuration file generated for fintrest on 2026-04-15T18:30:22-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fintrest'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  # auto_stop = off (not 'stop') so our IHostedService daemons — daily scan,
  # intraday drift watcher, morning briefing — keep running 24/7.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    method = 'GET'
    timeout = '5s'
    path = '/api/v1/market/pulse'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
